# -----------------------------------------------------------
# deploy.yml - GitHub Actions workflow for Azure App Service
# Triggers on push to main branch
# -----------------------------------------------------------
name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Next.js (standalone output)
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # 5. Package standalone output for Azure
      - name: Package for Azure
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone/* deploy-package/
          cp -r .next/static deploy-package/.next/static
          cp -r public deploy-package/public || true
          cp -r data deploy-package/data

      # 6. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "lead-to-launch-app"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-package
