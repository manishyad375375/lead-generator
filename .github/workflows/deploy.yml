name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry (ACR)
        run: |
          az acr login --name upsregistrydep

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: upsregistrydep.azurecr.io/lead-to-launch-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Enable admin on ACR if not already enabled (required for ACA registry pull)
            az acr update --name upsregistrydep --admin-enabled true
            
            # Fetch ACR credentials
            ACR_USER=$(az acr credential show --name upsregistrydep --query "username" -o tsv)
            ACR_PASS=$(az acr credential show --name upsregistrydep --query "passwords[0].value" -o tsv)
            
            # Create/Update Container App inside existing environment ups-env in Central India
            az containerapp create \
              --name lead-to-launch-app \
              --resource-group UPS_DEPLOYMENT \
              --environment ups-env \
              --image upsregistrydep.azurecr.io/lead-to-launch-app:latest \
              --target-port 8080 \
              --ingress external \
              --registry-server upsregistrydep.azurecr.io \
              --registry-username $ACR_USER \
              --registry-password $ACR_PASS \
              --env-vars \
                NODE_ENV=production \
                NEXT_TELEMETRY_DISABLED=1 \
                PORT=8080 \
                HOSTNAME=0.0.0.0
